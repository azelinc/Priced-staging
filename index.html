<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Price database — compare and track item prices across stores and websites">
  <title>Priced — Price Database</title>
  <link rel="stylesheet" href="main.css?v=12">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-top">
        <h1>Priced <span class="ver-badge" id="ver-badge">v12</span></h1>
        <button class="btn-icon" id="btn-login" title="Sign in to sync">🔐</button>
      </div>
      <p class="subtitle">Price database &amp; comparison</p>
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search items..." autocomplete="off">
        </div>
        <select id="filter-store">
          <option value="">All stores</option>
        </select>
        <select id="filter-category">
          <option value="">All categories</option>
        </select>
      </div>
    </header>

    <main id="items-list">
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <p>No items yet</p>
        <p class="empty-hint">Tap + to add your first item</p>
      </div>
    </main>

    <div class="fab-group">
      <button class="fab fab-scan" id="btn-scan" title="Scan barcode &amp; price tag">📷</button>
      <button class="fab fab-add" id="btn-add" title="Add item">+</button>
    </div>
  </div>

  <!-- MODAL: Add/Edit Item -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal">
      <h2 id="item-title">Add Item</h2>
      <div class="field">
        <label>Item name</label>
        <input type="text" id="i-name" placeholder="e.g. Gardenia White Bread" autocomplete="off">
      </div>
      <div class="field">
        <label>Category</label>
        <div class="chip-row" id="cat-chips"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-danger btn-sm" id="btn-item-delete" style="display:none;">Delete Item</button>
        <div class="modal-actions-right">
          <button class="btn-ghost btn-sm" id="btn-item-cancel">Cancel</button>
          <button class="btn-primary btn-sm" id="btn-item-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Detail / Price Comparison -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal modal-wide">
      <div class="detail-header">
        <h2 id="d-title"></h2>
        <div class="detail-header-meta">
          <span class="cat-badge" id="d-cat-badge"></span>
        </div>
      </div>

      <div class="variant-tabs" id="d-variant-tabs"></div>
      <div id="d-variant-sections"></div>
      <div id="d-scrape-results"></div>

      <div class="modal-actions" style="margin-top:16px;">
        <div>
          <button class="btn-ghost btn-sm" id="d-edit-item">✏️ Edit item</button>
        </div>
        <div class="modal-actions-right">
          <button class="btn-ghost btn-sm" id="btn-detail-close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Add/Edit Price Entry -->
  <div class="modal-overlay" id="price-modal">
    <div class="modal">
      <h2 id="p-title">Add Price</h2>
      <div class="field">
        <label>Store / Website</label>
        <input type="text" id="p-store" placeholder="e.g. Lotus's, AEON, NSK" autocomplete="off" list="price-store-list">
        <datalist id="price-store-list"></datalist>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Price (RM)</label>
          <input type="number" id="p-price" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="text" id="p-qty" placeholder="1 unit / 1kg / 500g">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="p-date">
        </div>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <input type="text" id="p-notes" placeholder="e.g. member price, promotion, online" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-danger btn-sm" id="btn-price-delete" style="display:none;">Delete</button>
        <div class="modal-actions-right">
          <button class="btn-ghost btn-sm" id="btn-price-cancel">Cancel</button>
          <button class="btn-primary btn-sm" id="btn-price-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL: Single-Shot Price Tag Scanner -->
  <div class="modal-overlay" id="scanner-modal">
    <div class="modal modal-scanner">
      <div class="scanner-header">
        <h2>📷 Point at Price Tag</h2>
        <button class="btn-icon" id="btn-scanner-close" title="Close">✕</button>
      </div>
      <div id="scanner-view">
        <div id="scanner-reader"></div>
      </div>
      <div id="scanner-error" class="scanner-error"></div>
      <p class="scanner-hint" id="scanner-hint">Point at price tag, then tap the button</p>
      <button class="btn-shutter" id="btn-snap">📸 Snap</button>
    </div>
  </div>

  <!-- Hidden canvas for frame capture -->
  <canvas id="ocr-canvas" style="display:none;"></canvas>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
